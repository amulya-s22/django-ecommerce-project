<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

    <h2>Login Page</h2>

    <form method="post">
        {% csrf_token %}

        <label>Username:</label>
        {{ form.username }} <br><br>

        <label>Password:</label>
        {{ form.password }} <br><br>

        <button type="submit">Login</button>
    </form>

</body>
</html>

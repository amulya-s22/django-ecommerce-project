<!DOCTYPE html>
<html>
<head>
    <title>E-Commerce</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 150px;
            height: 150px;
            object-fit: cover;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        button {
            background-color: #ff9900;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #e68a00;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>
<div style="background:black; color:white; padding:15px;">
    <h2 style="display:inline;">My Store</h2>

    <a href="/cart/" style="float:right; color:white;">Cart 🛒</a>
</div>
<h1>🛒 All Products</h1>

<div class="container">
    {% for product in products %}
    <div class="card">

        <h3>{{ product.name }}</h3>

        <img src="{{ product.image.url }}">

        <p class="price">₹ {{ product.price }}</p>

        <p>{{ product.description }}</p>

        <a href="{% url 'add_to_cart' product.id %}">
            <button>Add to Cart</button>
        </a>

        <br><br>

        <a href="/cart/">Go to Cart</a>

    </div>
    {% endfor %}
</div>

</body>
</html>

<h1>Your Cart</h1>

{% for product in products %}
    <div>
        <h2>{{ product.name }}</h2>
        <p>Price: {{ product.price }}</p>

        <a href="{% url 'remove_from_cart' product.id %}">
            <button>Remove</button>
        </a>
        <a href="/checkout/">
    <button>Proceed to Checkout</button>
</a>
    </div>
{% empty %}
    <p>Cart is empty</p>
{% endfor %}
